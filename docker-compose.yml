version: '3.8'

services:

  backend:
    build:
      context: .
      dockerfile: datn_be/Dockerfile
    container_name: datnbe
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx512m -Xms256m
    networks:
      - datn-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: datn_fe/Dockerfile
    container_name: datnfe
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - datn-net
    volumes:
      - /root/ssl:/etc/nginx/ssl
    restart: unless-stopped

networks:
  datn-net:
    driver: bridge
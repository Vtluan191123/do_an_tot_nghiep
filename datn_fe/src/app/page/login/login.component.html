<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Đăng Nhập</h1>
      <p>Chào mừng quay trở lại</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Error Message -->
      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
        <strong>Lỗi!</strong> {{ errorMessage }}
      </div>

      <!-- Username Field -->
      <div class="form-group">
        <label for="username" class="form-label">Tên đăng nhập hoặc Email</label>
        <input
          type="text"
          class="form-control"
          id="username"
          formControlName="username"
          placeholder="Nhập tên đăng nhập"
          [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
        />
        <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="invalid-feedback">
          <small *ngIf="loginForm.get('username')?.errors?.['required']">Tên đăng nhập không được để trống</small>
          <small *ngIf="loginForm.get('username')?.errors?.['minlength']">Tên đăng nhập phải có ít nhất 3 ký tự</small>
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password" class="form-label">Mật khẩu</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-control"
            id="password"
            formControlName="password"
            placeholder="Nhập mật khẩu"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
          <button
            type="button"
            class="btn-toggle-password"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="invalid-feedback">
          <small *ngIf="loginForm.get('password')?.errors?.['required']">Mật khẩu không được để trống</small>
          <small *ngIf="loginForm.get('password')?.errors?.['minlength']">Mật khẩu phải có ít nhất 6 ký tự</small>
        </div>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="form-options">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe" />
          <label class="form-check-label" for="rememberMe">
            Ghi nhớ tôi
          </label>
        </div>
        <a href="#" class="forgot-password">Quên mật khẩu?</a>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn btn-primary w-100 login-btn"
        [disabled]="isLoading || loginForm.invalid"
      >
        <span *ngIf="!isLoading">Đăng Nhập</span>
        <span *ngIf="isLoading">
          <i class="fas fa-spinner fa-spin"></i> Đang đăng nhập...
        </span>
      </button>
    </form>

    <!-- Register Link -->
    <div class="login-footer">
      <p>Chưa có tài khoản? <a (click)="goToRegister()" class="register-link">Đăng ký ngay</a></p>
    </div>

    <!-- Social Login (Optional) -->
    <div class="social-login">
      <p>Hoặc đăng nhập bằng</p>
      <div class="social-buttons">
        <button type="button" class="btn btn-social btn-google">
          <i class="fab fa-google"></i> Google
        </button>
        <button type="button" class="btn btn-social btn-facebook">
          <i class="fab fa-facebook"></i> Facebook
        </button>
      </div>
    </div>
  </div>
</div>

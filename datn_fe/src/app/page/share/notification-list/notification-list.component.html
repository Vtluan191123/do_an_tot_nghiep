<div class="notification-container">
  <!-- Header -->
  <div class="notification-header">
    <h3>Thông báo</h3>
    <div class="notification-actions">
      <button *ngIf="notifications.length > 0" class="action-btn" (click)="markAllAsRead()" title="Đánh dấu tất cả đã đọc">
        ✓
      </button>
      <button *ngIf="notifications.length > 0" class="action-btn danger" (click)="clearAllNotifications()" title="Xóa tất cả">
        ✕
      </button>
    </div>
  </div>

  <!-- Notifications List -->
  <div class="notification-list">
    @if(notifications.length === 0) {
      <div class="empty-state">
        <p>Không có thông báo mới</p>
      </div>
    } @else {
      <div *ngFor="let notification of notifications"
           class="notification-item"
           [class.unread]="!notification.isRead"
           (click)="onNotificationClick(notification)">

        <!-- Avatar -->
        <div class="notification-avatar" *ngIf="notification.avatar">
          <img [src]="notification.avatar" [alt]="notification.title" />
          <span class="notification-badge" [attr.data-type]="notification.type">
            {{ getNotificationIcon(notification.type) }}
          </span>
        </div>

        <!-- Content -->
        <div class="notification-content">
          <div class="notification-title">
            <strong>{{ notification.title }}</strong>
          </div>
          <div class="notification-description">
            {{ notification.description }}
          </div>
          <div class="notification-time">
            {{ getTimeAgo(notification.timestamp) }}
          </div>
        </div>

        <!-- Delete Button -->
        <button class="delete-btn" (click)="deleteNotification(notification.id, $event)" title="Xóa">
          ✕
        </button>
      </div>
    }
  </div>
</div>

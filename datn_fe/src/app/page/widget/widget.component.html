<div
  class="ai-container"
  [style.right.px]="position.x"
  [style.bottom.px]="position.y"
  (mousedown)="startDrag($event)"
  [class.dragging]="isDragging"
>
  <!-- AI Button -->
  <button
    class="ai-button"
    (click)="toggle($event)"
    title="Mở AI Support"
    aria-label="AI Support Chat Button"
  >
    🤖
  </button>

  <!-- Chat Panel -->
  <div
    class="chat-panel"
    *ngIf="isOpen"
    role="dialog"
    aria-label="AI Support Chat"
  >
    <!-- Header -->
    <div class="header">
      <span>AI Support 🚀</span>
      <span
        class="close"
        (click)="toggle($event)"
        role="button"
        tabindex="0"
        title="Đóng chat"
        aria-label="Đóng chat"
      >✖</span>
    </div>

    <!-- Messages -->
    <div class="messages" role="log" aria-live="polite">
      <div *ngFor="let msg of messages" role="article">
        {{ msg }}
      </div>
    </div>

    <!-- Input -->
    <input
      [(ngModel)]="input"
      (keyup.enter)="send()"
      type="text"
      placeholder="Nhập câu hỏi..."
      aria-label="Nhập tin nhắn"
      role="textbox"
    />
  </div>

</div>

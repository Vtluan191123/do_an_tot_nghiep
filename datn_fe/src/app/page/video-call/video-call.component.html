<div class="wrapper-video-call">
  <div class="call-receiver">
    <div class="avatar"></div>
    <h2>Vũ Thành Luân</h2>
    <p>Đang gọi ...</p>
  </div>
  <div class="action">
    <div class="action-item">
      <span (click)="handleStart()" [innerHTML]="CAMERA_OPEN | safeHtml"></span>
    </div>
    <div class="action-item">
      <span [innerHTML]="MICRO | safeHtml"></span>
    </div>
    <div class="action-item">
      <span [innerHTML]="ICON_PHONE | safeHtml"></span>
    </div>
  </div>
  <div class="call-current" [class.open]="isOpenScreenUserCurrent">
    <video #localVideo id="localVideo" playsinline autoplay *ngIf="isOpenScreenUserCurrent" style="background: #0b0b0b;width: 100%;height: 100%">

    </video>
    <div  class="toggle-open-close" >
      <span (click)="handleToggleCallCurrent()" [innerHTML]="(isOpenScreenUserCurrent ?  ICON_ARROW_RIGHT: ICON_ARROW_LEFT )| safeHtml"></span>
    </div>
  </div>
</div>

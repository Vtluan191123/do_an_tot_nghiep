version: '3.8'

services:

  backend:
    build:
      context: .
      dockerfile: datn_be/Dockerfile
      args:
        PROFILE: prod
    container_name: ${BACKEND_CONTAINER_NAME}
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - JAVA_OPTS=${JAVA_OPTS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - MONGODB_HOST=${MONGODB_HOST}
      - MONGODB_PORT=${MONGODB_PORT}
      - MONGODB_NAME=${MONGODB_NAME}
      - FILE_UPLOAD_DIR=${FILE_UPLOAD_DIR}
    networks:
      - datn-net
    restart: unless-stopped
    volumes:
      - upload_data:${FILE_UPLOAD_DIR}

  frontend:
    build:
      context: .
      dockerfile: datn_fe/Dockerfile
      args:
        PROFILE: prod
    container_name: ${FRONTEND_CONTAINER_NAME}
    ports:
      - "80:80"
      - "443:443"
    environment:
      - API_BASE_URL=${API_BASE_URL}
      - APP_ENV=${APP_ENV}
    depends_on:
      - backend
    networks:
      - datn-net
    volumes:
      - ${SSL_CERT_PATH}:/etc/nginx/ssl
    restart: unless-stopped

networks:
  datn-net:
    driver: bridge

volumes:
  upload_data:

